name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Add MinGW to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:\msys64\mingw64\bin" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          version="${ref#v}"
          target="${{ matrix.target }}"
          name="luatos-tools-v${version}-${target}"
          mkdir -p "dist/${name}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${target}/release/luatos-tools.exe" "dist/${name}/"
          else
            cp "target/${target}/release/luatos-tools" "dist/${name}/"
          fi
          cp README.md README.zh-CN.md LICENSE "dist/${name}/"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && 7z a "${name}.zip" "${name}" >/dev/null)
            echo "asset=dist/${name}.zip" >> "$GITHUB_OUTPUT"
          else
            (cd dist && tar czf "${name}.tar.gz" "${name}")
            echo "asset=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.stage.outputs.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha_macos_arm: ${{ steps.meta.outputs.sha_macos_arm }}
      sha_macos_intel: ${{ steps.meta.outputs.sha_macos_intel }}
      sha_linux: ${{ steps.meta.outputs.sha_linux }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          version="${ref#v}"
          cd dist
          ls -la
          sha_macos_arm=$(sha256sum "luatos-tools-v${version}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')
          sha_macos_intel=$(sha256sum "luatos-tools-v${version}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')
          sha_linux=$(sha256sum "luatos-tools-v${version}-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')
          sha256sum luatos-tools-* > checksums.txt
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha_macos_arm=${sha_macos_arm}" >> "$GITHUB_OUTPUT"
          echo "sha_macos_intel=${sha_macos_intel}" >> "$GITHUB_OUTPUT"
          echo "sha_linux=${sha_linux}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true

  update-tap:
    name: update homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: yuzhan-tech/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Write formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA_MACOS_ARM: ${{ needs.release.outputs.sha_macos_arm }}
          SHA_MACOS_INTEL: ${{ needs.release.outputs.sha_macos_intel }}
          SHA_LINUX: ${{ needs.release.outputs.sha_linux }}
        run: |
          mkdir -p Formula
          cat > Formula/luatos-tools.rb <<EOF
          class LuatosTools < Formula
            desc "Rust CLI for LuatOS firmware packaging, flashing, and serial monitoring"
            homepage "https://github.com/yuzhan-tech/luatos-tools"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/yuzhan-tech/luatos-tools/releases/download/v${VERSION}/luatos-tools-v${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              else
                url "https://github.com/yuzhan-tech/luatos-tools/releases/download/v${VERSION}/luatos-tools-v${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_INTEL}"
              end
            end

            on_linux do
              url "https://github.com/yuzhan-tech/luatos-tools/releases/download/v${VERSION}/luatos-tools-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "luatos-tools"
            end

            test do
              system bin/"luatos-tools", "--help"
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/luatos-tools.rb
          if git diff --staged --quiet; then
            echo "No changes to formula"
          else
            git commit -m "luatos-tools ${{ needs.release.outputs.version }}"
            git push
          fi
